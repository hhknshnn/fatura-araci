<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatura Aracı</title>
</head>
<body>
    <script>
        let groupWeights = {};
        let exceptionSkus = {};

        async function loadSharedConfig() {
            try {
                const response = await fetch('./config.json?v=' + Date.now());
                if (!response.ok) throw new Error('Network response was not ok');
                const config = await response.json();
                exceptionSkus = JSON.parse(JSON.stringify(config.defaultExceptionSkus));
                groupWeights = JSON.parse(JSON.stringify(config.defaultGroupWeights));
            } catch (error) {
                console.error('Fetch error: ', error);
                // Handle the error gracefully
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadSharedConfig();
            renderExSkuList();
        });

        // Ensure existing functionality remains here...
        // Local edits will be handled only in memory without localStorage.
    </script>
</body>
</html>
